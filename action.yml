name: 'JIRA Validation'
description: 'Validates that PR title, branch name, and commit messages contain a JIRA ticket reference'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  jira-keys:
    description: 'Comma-separated list of JIRA project keys (e.g. "DOKTUZ" or "DOKTUZ,PROJ,TEAM")'
    required: true
  skip-branch-check:
    description: 'Skip branch name validation'
    required: false
    default: 'false'
  skip-commit-check:
    description: 'Skip commit message validation'
    required: false
    default: 'false'
  skip-pr-title-check:
    description: 'Skip PR title validation'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Validate JIRA references
      uses: actions/github-script@v7
      env:
        JIRA_KEYS: ${{ inputs.jira-keys }}
        SKIP_BRANCH_CHECK: ${{ inputs.skip-branch-check }}
        SKIP_COMMIT_CHECK: ${{ inputs.skip-commit-check }}
        SKIP_PR_TITLE_CHECK: ${{ inputs.skip-pr-title-check }}
      with:
        script: |
          const script = require(`${process.env.GITHUB_ACTION_PATH}/validate.js`)
          await script({ github, context, core })
